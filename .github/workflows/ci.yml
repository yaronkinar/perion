name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: backend (jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Run backend unit tests with JSON report
        run: |
          docker compose -f docker-compose.test.yml --profile unit \
            run --build backend-unit npm run test:report

      - name: Copy backend test report
        if: always()
        run: |
          cid=$(docker compose -f docker-compose.test.yml --profile unit \
                  ps -aq backend-unit | head -n 1)
          if [ -n "$cid" ]; then
            docker cp "$cid":/app/test-report.json ./backend-test-report.json || true
          fi

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: backend-test-report
          path: backend-test-report.json
          if-no-files-found: warn
          retention-days: 7

      - name: Publish backend test summary
        if: always()
        run: |
          if [ -f backend-test-report.json ]; then
            node -e "const fs=require('fs');const p='backend-test-report.json';const r=JSON.parse(fs.readFileSync(p,'utf8'));const total=r.numTotalTests??0;const passed=r.numPassedTests??0;const failed=r.numFailedTests??0;const pending=r.numPendingTests??0;const runtimeMs=(r.testResults||[]).reduce((acc,t)=>acc+(t.endTime&&t.startTime?Math.max(0,t.endTime-t.startTime):0),0);const lines=['## Backend test report (Jest)','', '- Total: '+total, '- Passed: '+passed, '- Failed: '+failed, '- Pending: '+pending, '- Runtime: '+(runtimeMs/1000).toFixed(2)+'s',''];fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,lines.join('\n'));"
          else
            echo "## Backend test report (Jest)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Report file not found." >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend:
    name: frontend (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Run frontend unit tests with JSON report
        run: |
          docker compose -f docker-compose.test.yml --profile unit \
            run --build frontend-unit npm run test:report

      - name: Copy frontend test report
        if: always()
        run: |
          cid=$(docker compose -f docker-compose.test.yml --profile unit \
                  ps -aq frontend-unit | head -n 1)
          if [ -n "$cid" ]; then
            docker cp "$cid":/app/test-report.json ./frontend-test-report.json || true
          fi

      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: frontend-test-report
          path: frontend-test-report.json
          if-no-files-found: warn
          retention-days: 7

      - name: Publish frontend test summary
        if: always()
        run: |
          if [ -f frontend-test-report.json ]; then
            node -e "const fs=require('fs');const p='frontend-test-report.json';const r=JSON.parse(fs.readFileSync(p,'utf8'));const total=r.numTotalTests??r.numTotalTestSuites??r.testResults?.length??0;const passed=r.numPassedTests??r.numPassedTestSuites??0;const failed=r.numFailedTests??r.numFailedTestSuites??0;const pending=r.numPendingTests??r.numPendingTestSuites??0;const runtimeMs=(r.testResults||[]).reduce((acc,t)=>acc+((typeof t.duration==='number'&&Number.isFinite(t.duration))?t.duration:0),0);const lines=['## Frontend test report (Vitest)','', '- Total: '+total, '- Passed: '+passed, '- Failed: '+failed, '- Pending: '+pending, '- Runtime: '+(runtimeMs/1000).toFixed(2)+'s',''];fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,lines.join('\n'));"
          else
            echo "## Frontend test report (Vitest)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Report file not found." >> "$GITHUB_STEP_SUMMARY"
          fi

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4

      - name: Run end-to-end tests
        run: |
          docker compose -f docker-compose.test.yml --profile e2e \
            up --build --abort-on-container-exit --exit-code-from e2e

      - name: Copy Playwright JSON report
        if: always()
        run: |
          cid=$(docker compose -f docker-compose.test.yml --profile e2e \
                  ps -aq e2e | head -n 1)
          if [ -n "$cid" ]; then
            docker cp "$cid":/work/playwright-report.json ./playwright-report.json || true
          fi

      - name: Publish Playwright summary
        if: always()
        run: |
          if [ -f playwright-report.json ]; then
            node -e "const fs=require('fs');const p='playwright-report.json';const r=JSON.parse(fs.readFileSync(p,'utf8'));const s=r.stats||{};const total=(s.expected??0)+(s.unexpected??0)+(s.flaky??0)+(s.skipped??0);const passed=s.expected??0;const failed=s.unexpected??0;const flaky=s.flaky??0;const skipped=s.skipped??0;const durationMs=s.duration??0;const lines=['## Client E2E report (Playwright)','', '- Total: '+total, '- Passed: '+passed, '- Failed: '+failed, '- Flaky: '+flaky, '- Skipped: '+skipped, '- Runtime: '+(durationMs/1000).toFixed(2)+'s',''];fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,lines.join('\n'));"
          else
            echo "## Client E2E report (Playwright)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Report file not found (ensure Playwright JSON reporter writes /work/playwright-report.json)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Copy Playwright artifacts out of the e2e container
        if: failure()
        run: |
          cid=$(docker compose -f docker-compose.test.yml --profile e2e \
                  ps -aq e2e | head -n 1)
          if [ -n "$cid" ]; then
            docker cp "$cid":/work/playwright-report ./playwright-report || true
            docker cp "$cid":/work/test-results ./test-results || true
          fi
          docker compose -f docker-compose.test.yml --profile e2e logs backend > backend.log || true

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            playwright-report.json
            playwright-report
            test-results
            backend.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml --profile e2e down -v
