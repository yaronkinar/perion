name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Run backend unit tests
        run: |
          docker compose -f docker-compose.test.yml --profile unit \
            run --rm --build backend-unit

  frontend:
    name: frontend (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Run frontend unit tests
        run: |
          docker compose -f docker-compose.test.yml --profile unit \
            run --rm --build frontend-unit

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Run end-to-end tests
        run: |
          docker compose -f docker-compose.test.yml --profile e2e \
            up --build --abort-on-container-exit --exit-code-from e2e

      - name: Copy Playwright artifacts out of the e2e container
        if: failure()
        run: |
          cid=$(docker compose -f docker-compose.test.yml --profile e2e \
                  ps -aq e2e | head -n 1)
          if [ -n "$cid" ]; then
            docker cp "$cid":/work/playwright-report ./playwright-report || true
            docker cp "$cid":/work/test-results ./test-results || true
          fi
          docker compose -f docker-compose.test.yml --profile e2e logs backend > backend.log || true

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
            backend.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml --profile e2e down -v
