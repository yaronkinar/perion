services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: perion_rbac
      POSTGRES_USER: perion
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perion -d perion_rbac"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://perion:secret@postgres:5432/perion_rbac
      # NODE_ENV=production + trust proxy. COOKIE_SECURE=false so sessions work on
      # http://localhost (see backend `useSecureCookies`). Demo auth stays enabled.
      NODE_ENV: ${BACKEND_NODE_ENV:-production}
      PORT: "4000"
      CORS_ORIGIN: http://localhost:3000
      SESSION_SECRET: dev-session-secret-needs-32-chars-minimum
      JWT_SECRET: dev-jwt-secret-also-needs-32-chars-minimum
      # Browsers omit Secure cookies on plain HTTP — required for localhost compose.
      COOKIE_SECURE: "false"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
